name: ビルド時共通部分

on: workflow_call

jobs:

    build-gba:
        runs-on: ubuntu-latest
        container:
            image: devkitpro/devkitarm:latest
        steps:
            - uses: actions/checkout@v6
            - name: run .build.sh
              run: |
                  chmod +x ./build.sh
                  ./build.sh
                  mv ./src/c/game_core/*.gba ./

            - name: upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: build-gba
                  path: |
                      ./*.gba

    build-exe:
        runs-on: windows-latest
        needs: [build-gba]
        steps:
            - uses: actions/checkout@v6

            - name: download artifact
              uses: actions/download-artifact@v7
              with:
                  name: build-gba
                  path: ./

            - name: setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"

            - name: install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pyinstaller
                  pip install -r ./src/python/converter/requirements.txt
            
            - name: Run Python - create_licenses_txt
              run: |
                  python './src/python/create_licenses_txt/create_licenses_txt.py'

            - name: build exe
              run: |
                  ls ./src/python/converter/
                  pyinstaller ./src/python/converter/main.py --noconsole --name Narcissu_GBA_Converter.exe

            - name: 必要なファイルを移動
              run: |
                  mv ./src/python/converter/tools ./dist/Narcissu_GBA_Converter.exe/
                  mv ./src/python/converter/resources ./dist/Narcissu_GBA_Converter.exe/
                  mv ./*.gba ./dist/Narcissu_GBA_Converter.exe/resources/base_gba
                  mv ./licenses_py.txt ./dist/Narcissu_GBA_Converter.exe/resources/lib_license

            - name: upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: build-exe
                  path: |
                      ./dist/Narcissu_GBA_Converter.exe
