name: releaseç”¨

on:
    release:
        types: [published]
permissions:
    contents: write

jobs:
    call-build-main:
        uses: ./.github/workflows/build-main.yml
        secrets: inherit


    upload-asset:
        runs-on: ubuntu-latest
        needs: [call-build-main]
        steps:
        - name: download artifact
          uses: actions/download-artifact@v7
          with:
              name: build-exe
              path: ./build-exe

        - name: create 7z archive
          run: |
                ls -al
                sudo apt-get install p7zip-full
                7z a -t7z ./release.7z ./build-exe/* -mx9

        - name: upload asset
          uses: softprops/action-gh-release@v2
          with:
              files: ./release.7z